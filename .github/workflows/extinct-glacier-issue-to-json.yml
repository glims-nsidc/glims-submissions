name: Parse extinct glacier issue to JSON

on:
  issues:
    types: [opened]

jobs:
  parse-to-json:
    if: contains(github.event.issue.labels.*.name, 'extinct glacier')
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install xlsx parser
        run: npm install xlsx

      - name: Parse issue body and append to JSON
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const https = require('https');
            const XLSX = require(`${process.env.GITHUB_WORKSPACE}/node_modules/xlsx`);

            const body = context.payload.issue.body || '';
            const issueNumber = context.payload.issue.number;
            const issueUrl = context.payload.issue.html_url;
            const createdAt = context.payload.issue.created_at;

            // Parse sections from the markdown body.
            // GitHub issue forms render each field as a ### heading followed by the value.
            function parseSection(body, heading) {
              const escaped = heading.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
              const regex = new RegExp(`###\\s*${escaped}\\s*\\n+([\\s\\S]*?)(?=\\n###|$)`);
              const match = body.match(regex);
              if (!match) return null;
              const value = match[1].trim();
              // GitHub renders empty optional fields as "_No response_"
              return (value === '_No response_' || value === '') ? null : value;
            }

            // Fetch a URL and return the response as a Buffer.
            function fetchBuffer(url) {
              return new Promise((resolve, reject) => {
                https.get(url, { headers: { 'Authorization': `token ${process.env.GITHUB_TOKEN}`, 'User-Agent': 'github-actions' } }, (res) => {
                  if (res.statusCode === 302 || res.statusCode === 301) {
                    return fetchBuffer(res.headers.location).then(resolve).catch(reject);
                  }
                  const chunks = [];
                  res.on('data', chunk => chunks.push(chunk));
                  res.on('end', () => resolve(Buffer.concat(chunks)));
                  res.on('error', reject);
                });
              });
            }

            // Parse glacier IDs from a file attachment linked in the section value.
            // Handles .txt, .csv (first column), and .xlsx (first column, first sheet).
            async function parseAttachment(raw) {
              const linkMatch = raw.match(/\[.*?\]\((https:\/\/github\.com\/[^\)]+)\)/);
              if (!linkMatch) return null;

              const url = linkMatch[1];
              const ext = url.split('?')[0].split('.').pop().toLowerCase();
              console.log(`Detected attachment: ${url} (type: ${ext})`);

              const buf = await fetchBuffer(url);

              if (ext === 'txt') {
                return buf.toString('utf8').split('\n').map(s => s.trim()).filter(Boolean);
              }

              if (ext === 'csv') {
                return buf.toString('utf8')
                  .split('\n')
                  .map(line => line.split(',')[0].trim())
                  .filter(Boolean);
              }

              if (ext === 'xlsx') {
                const workbook = XLSX.read(buf, { type: 'buffer' });
                const sheet = workbook.Sheets[workbook.SheetNames[0]];
                const rows = XLSX.utils.sheet_to_json(sheet, { header: 1 });
                return rows.map(row => String(row[0] || '').trim()).filter(Boolean);
              }

              console.log(`Unsupported attachment type: ${ext} — storing raw value`);
              return null;
            }

            const glacierIdsRaw = parseSection(body, 'Glacier IDs');

            // Check whether the section contains a file attachment link or plain pasted IDs.
            let glacierIds = [];
            if (glacierIdsRaw) {
              const fromFile = await parseAttachment(glacierIdsRaw);
              if (fromFile) {
                glacierIds = fromFile;
              } else {
                glacierIds = glacierIdsRaw.split('\n').map(s => s.trim()).filter(Boolean);
              }
            }

            const entry = {
              issue_number: issueNumber,
              issue_url: issueUrl,
              created_at: createdAt,
              glacier_ids: glacierIds,
              est_disappear_date: parseSection(body, 'Estimated disappearance date (`est_disappear_date`)'),
              est_disappear_unc: parseSection(body, 'Disappearance date uncertainty in days (`est_disappear_unc`)'),
              gone_source: parseSection(body, 'Source (`gone_source`)'),
              glims_added_extinct_date: parseSection(body, 'Date added to GLIMS as extinct (`glims_added_extinct_date`)'),
              notes: parseSection(body, 'Additional notes'),
            };

            console.log('Parsed entry:', JSON.stringify(entry, null, 2));

            const jsonPath = path.join(process.env.GITHUB_WORKSPACE, 'data', `extinct_glacier_submission_${issueNumber}.json`);
            fs.mkdirSync(path.dirname(jsonPath), { recursive: true });
            fs.writeFileSync(jsonPath, JSON.stringify(entry, null, 2));
            console.log(`Written entry to ${jsonPath}`);

      - name: Commit updated JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/extinct_glacier_submission_${{ github.event.issue.number }}.json
          git diff --cached --quiet || git commit -m "Add extinct_glacier_submission_${{ github.event.issue.number }}.json"
          git push
