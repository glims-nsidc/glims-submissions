# .github/workflows/jira-sync.yml
name: Create Jira Ticket from GitHub Issue

on:
  issues:
    types: [opened]

jobs:
  create-jira-issue:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    if: |
      contains(github.event.issue.labels.*.name, 'resubmission') ||
      contains(github.event.issue.labels.*.name, 'new submission') ||
      contains(github.event.issue.labels.*.name, 'extinct glacier')
    steps:
      - name: Login to Jira
        uses: atlassian/gajira-login@v3
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_USER_EMAIL: ${{ secrets.JIRA_USER_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}

      - name: Create Jira Issue
        id: create
        uses: atlassian/gajira-create@v3
        with:
          project: DPT
          issuetype: Story
          summary: "${{ github.event.issue.title }}"
          description: 
            _Synced from GitHub issue: ${{ github.event.issue.html_url }}_
          fields: |
            {
              "labels": ["nsidc0272"],
              "components": [{"name": "data production"}]
            }

      - name: Comment back on GitHub issue
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `Jira ticket created: ${{ steps.create.outputs.issue }}`
            })
